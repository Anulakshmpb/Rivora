name: Production Deployment CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to AWS EC2
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to Backend folder
            cd /var/www/ecommerce-website/Backend
            
            # Pull latest changes
            git pull origin main
            
            # Install production dependencies
            npm install --production
            
            # Reload application gracefully with PM2
            pm2 reload ecosystem.config.js --env production
            
            # Save PM2 process list
            pm2 save

  deploy-frontend:
    name: Build & Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm ci

      - name: Build React Application
        working-directory: ./Frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_RAZORPAY_KEY_ID: ${{ secrets.REACT_APP_RAZORPAY_KEY_ID }}
          # Avoid treating warnings as build failures in react-scripts
          CI: false
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync Build Folder to S3 Bucket
        run: |
          aws s3 sync Frontend/build/ s3://${{ secrets.AWS_S3_FRONTEND_BUCKET_NAME }} --delete --cache-control "max-age=31536000, public"

      - name: Invalidate CloudFront Distribution Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
